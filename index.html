<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Sock Recipe Builder</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="layout">
      <header class="hero">
        <h1>Calla's Custom Sock Generator</h1>
        <p>
          Enter measurements to generate a cuff-down heel-flap and gusset sock pattern.
        </p>
      </header>

      <section class="panel input-panel">
        <h2>Measurements</h2>
        <div class="measurement-guide" aria-hidden="true">
          <img src="./measuring_guide.png" alt="A clean, 3D digital rendering of a human foot on a white background used for sock knitting measurements. Teal measuring tapes are wrapped snugly around the ball of the foot (labeled 'Foot Circumference (ball)') and the instep arch (labeled 'Gusset Circumference'). A long teal double-headed arrow runs along the side of the foot from the heel to the toe, labeled 'Foot Length.'" class="measurement-guide-image" />
        </div>
        <form id="sockForm" novalidate>
          <div class="unit-controls">
            <label class="toggle-row" for="separateSides">
              <input id="separateSides" name="separateSides" type="checkbox" checked />
              Enter left and right values separately
            </label>

            <label class="unit-select-row" for="measurementUnit">
              Unit
              <select id="measurementUnit" name="measurementUnit">
                <option value="in" selected>Inches</option>
                <option value="cm">Centimeters</option>
              </select>
            </label>
          </div>

          <div class="grid-head" aria-hidden="true">
            <span>Measurement</span>
            <span class="left-head">Left (<span id="leftUnitLabel">in</span>)</span>
            <span class="right-head">Right (<span id="rightUnitLabel">in</span>)</span>
          </div>

          <label class="measurement-row">Foot Circumference
            <input class="left-input" id="footCircumferenceL" name="footCircumferenceL" type="number" min="0" step="0.01" required />
            <input class="right-input" id="footCircumferenceR" name="footCircumferenceR" type="number" min="0" step="0.01" required />
          </label>

          <label class="measurement-row">Gusset Circumference
            <input class="left-input" id="gussetCircumferenceL" name="gussetCircumferenceL" type="number" min="0" step="0.01" required />
            <input class="right-input" id="gussetCircumferenceR" name="gussetCircumferenceR" type="number" min="0" step="0.01" required />
          </label>

          <label class="measurement-row">Foot Length
            <input class="left-input" id="footLengthL" name="footLengthL" type="number" min="0" step="0.01" required />
            <input class="right-input" id="footLengthR" name="footLengthR" type="number" min="0" step="0.01" required />
          </label>

          <div class="gauge-row">
            <label>Needle Size
              <div class="needle-size-controls">
                <input id="needleSize" name="needleSize" type="text" required placeholder="" />
                <select id="needleSizeUnit" name="needleSizeUnit" class="needle-size-unit-select" aria-label="Needle size unit">
                  <option value="us" selected>US</option>
                  <option value="metric">Metric</option>
                </select>
              </div>
            </label>
            <label>Stitch Gauge (stitches/<span id="stitchGaugeScaleLabel">4 in</span>)
              <input id="stitchGauge" name="stitchGauge" type="number" min="0" step="0.01" required />
            </label>
            <label>Row Gauge (rows/<span id="rowGaugeScaleLabel">4 in</span>)
              <input id="rowGauge" name="rowGauge" type="number" min="0" step="0.01" required />
            </label>
          </div>

          <div class="button-row">
            <button type="submit" class="btn-primary">Generate Pattern</button>
            <button type="button" id="downloadPdfBtn" class="btn-secondary">Download PDF</button>
          </div>
          <p id="formError" class="error" role="alert" aria-live="polite"></p>
        </form>
      </section>

      <section class="panel print-panel" id="printArea">
        <h2>Pattern Preview</h2>
        <article id="patternOutput" class="pattern-output">
          Fill out the form and click <strong>Generate Pattern</strong>.
        </article>
      </section>
    </main>

    <script id="templateMarkdown" type="text/plain">
# Calla's Custom Sock Recipe

This sock recipe was generated by a program written by Calla Carter.

Gauge: {gauge_st_per_unit} stitches and {gauge_row_per_unit} rows per inch.

## Leg

Cast on {cast_on_s_l} (L) / {cast_on_s_r} (R) stitches on size {needle_size} double-pointed needles or circular needles if using magic loop.

Join in the round and work the cuff for approximately 1" in 2x2 ribbing (or method of choice).

Work in stockinette until the piece measures 7" (or desired length) from cast on.

## Heel Flap

To begin, first knit {heel_flap_s_l} (L) / {heel_flap_s_r} (R) stitches.

Those stitches are the first half of your stitches (top of foot). The second half is where you will knit your heel.

Now that you have knit across the first half of your stitches, cut your main color and pick up your contrasting color.

Work back and forth across the next {heel_flap_s_l} (L) / {heel_flap_s_r} (R) stitches.

Row 1: K2, [sl1, k1] to end. Turn work.

Row 2: Sl1, p to end. Turn work.

Row 3: [sl1, k1] to end. Turn work.

Repeat rows 2 and 3 until {heel_flap_r_l} (L) / {heel_flap_r_r} (R) heel flap rows have been worked in total.

## Turn

Now that your heel flap is complete, it's time to turn the heel.

You should have ended your heel flap after a purl row.

Row 1: Sl1, k to center, ssk, k1, turn.

Row 2: Sl1, p to center, p2tog, p1, turn.

Continue in this pattern until all heel stitches have been worked.

You should now have {after_heel_turn_s_l} (L) / {after_heel_turn_s_r} (R) heel stitches.

## Gusset

With right side facing, pick up and knit stitches along the left side of the heel flap.

Knit across front-of-foot stitches.

Pick up and knit stitches along the right side of heel flap, then continue around.

Row 1: Work to marker, sl marker, k1, ssk, knit to 3 stitches before end, k2tog, k1.

Row 2: Work even.

Repeat these two rows until you have {foot_s_l} (L) / {foot_s_r} (R) stitches.

## Foot

Knit in stockinette until the work reaches the tip of the wearer's pinky toe.

If you cannot try on the sock, continue until {foot_r_l} (L) / {foot_r_r} (R) rows have been worked from the gusset.

## Toe

Cut main color and pick up contrasting color.

Knit one round even, then shape toe:

Row 1: K1, ssk, knit to 3 stitches before end of needle, k2tog, k1. Repeat for second needle.

Row 2: Knit.

Repeat rows 1 and 2 until {toe_decrease1_s_l} (L) / {toe_decrease1_s_r} (R) stitches remain.

Then repeat row 1 until {toe_decrease2_s_l} (L) / {toe_decrease2_s_r} (R) stitches remain.

Graft with Kitchener stitch.
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.12.1/html2pdf.bundle.min.js"></script>
    <script src="./logic.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
