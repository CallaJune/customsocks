<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calla's Custom Sock Recipe Generator</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="layout">
      <header class="hero">
        <h1>Calla's Custom Sock Recipe Generator</h1>
        <p>
          Enter measurements to generate a cuff-down heel-flap and gusset sock knitting pattern.
        </p>
      </header>

      <section class="panel input-panel">
        <h2>Measurements</h2>
        <div class="measurement-guide" aria-hidden="true">
          <img src="./measuring_guide.png" alt="A clean, 3D digital rendering of a human foot on a white background used for sock knitting measurements. Teal measuring tapes are wrapped snugly around the ball of the foot (labeled 'Foot Circumference (ball)') and the instep arch (labeled 'Gusset Circumference'). A long teal double-headed arrow runs along the side of the foot from the heel to the toe, labeled 'Foot Length.'" class="measurement-guide-image" />
        </div>
        <form id="sockForm" novalidate>
          <div class="unit-controls">
            <label class="toggle-row" for="separateSides">
              <input id="separateSides" name="separateSides" type="checkbox" />
              Enter left and right values separately
            </label>

            <label class="unit-select-row" for="measurementUnit">
              Unit
              <select id="measurementUnit" name="measurementUnit">
                <option value="in" selected>Inches</option>
                <option value="cm">Centimeters</option>
              </select>
            </label>
          </div>

          <div class="grid-head" aria-hidden="true">
            <span>Measurement</span>
            <span class="left-head">Left (<span id="leftUnitLabel">in</span>)</span>
            <span class="right-head">Right (<span id="rightUnitLabel">in</span>)</span>
          </div>

          <label class="measurement-row">
            <span class="measurement-name">Foot Circumference</span>
            <span class="measurement-input-wrap left-wrap">
              <span class="side-label">Left</span>
              <input class="left-input" id="footCircumferenceL" name="footCircumferenceL" type="number" min="0" step="0.01" required />
            </span>
            <span class="measurement-input-wrap right-wrap">
              <span class="side-label">Right</span>
              <input class="right-input" id="footCircumferenceR" name="footCircumferenceR" type="number" min="0" step="0.01" required />
            </span>
          </label>

          <label class="measurement-row">
            <span class="measurement-name">Gusset Circumference</span>
            <span class="measurement-input-wrap left-wrap">
              <span class="side-label">Left</span>
              <input class="left-input" id="gussetCircumferenceL" name="gussetCircumferenceL" type="number" min="0" step="0.01" required />
            </span>
            <span class="measurement-input-wrap right-wrap">
              <span class="side-label">Right</span>
              <input class="right-input" id="gussetCircumferenceR" name="gussetCircumferenceR" type="number" min="0" step="0.01" required />
            </span>
          </label>

          <label class="measurement-row">
            <span class="measurement-name">Foot Length</span>
            <span class="measurement-input-wrap left-wrap">
              <span class="side-label">Left</span>
              <input class="left-input" id="footLengthL" name="footLengthL" type="number" min="0" step="0.01" required />
            </span>
            <span class="measurement-input-wrap right-wrap">
              <span class="side-label">Right</span>
              <input class="right-input" id="footLengthR" name="footLengthR" type="number" min="0" step="0.01" required />
            </span>
          </label>

          <div class="gauge-row">
            <label>Needle Size
              <div class="needle-size-controls">
                <input id="needleSize" name="needleSize" type="text" required placeholder="" />
                <select id="needleSizeUnit" name="needleSizeUnit" class="needle-size-unit-select" aria-label="Needle size unit">
                  <option value="us" selected>US</option>
                  <option value="metric">Metric</option>
                </select>
              </div>
            </label>
            <label>Stitch Gauge (stitches/<span id="stitchGaugeScaleLabel">4 in</span>)
              <input id="stitchGauge" name="stitchGauge" type="number" min="0" step="0.01" required />
            </label>
            <label>Row Gauge (rows/<span id="rowGaugeScaleLabel">4 in</span>)
              <input id="rowGauge" name="rowGauge" type="number" min="0" step="0.01" required />
            </label>
          </div>

          <div class="button-row">
            <button type="submit" class="btn-primary">Generate Pattern</button>
            <button type="button" id="downloadPdfBtn" class="btn-secondary">Download PDF</button>
          </div>
          <p id="formError" class="error" role="alert" aria-live="polite"></p>
        </form>
      </section>

      <section class="panel print-panel" id="printArea">
        <h2>Pattern Preview</h2>
        <article id="patternOutput" class="pattern-output">
          Fill out the form and click <strong>Generate Pattern</strong>.
        </article>
      </section>
    </main>

    <script id="templateMarkdown" type="text/plain">  
Rendering failed. If rendering locally, run using python3 -m http.server 8000 and access via http://localhost:8000.
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.12.1/html2pdf.bundle.min.js"></script>
    <script src="./logic.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
